<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Environment Health Tracker</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="topbar">
            <h1>🌍 Environmental Health Tracker</h1>
            <p>Real-time environmental data powered by satellite & AI</p>
            <p style="font-size:13px; color:#99b1ca">
            Map boundaries are approximate & do not imply official recognition.
            </p>
        </div>

        <div id="main">
    <div id="sidebar">
        <div id="topbar">
    <div id="topTitleArea">
    </div>
    <div id="topButtons">
        <button class="topBtn" id="btnAirQuality"> Air Quality</button>
        <button class="topBtn" id="btnFires"> Forest Fires</button>
        <button class="topBtn" id="btnDeforestation"> Deforestation</button>
    </div>
</div>

        <div id="areaInfo">
            <p class="placeholder">Click anywhere on the map to see environmental data.</p>
        </div>
    </div>

    <div id="rightPanel">
        <div id="map"></div>
        <div id="reports">
            <h3> Recent Location Reports</h3>
            <div id="reportsList"></div>
        </div>
    </div>
</div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="app.js"></script>
    </body>
</html>
